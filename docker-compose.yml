# Docker Compose for Hop Framework Test Environment
# Usage: docker-compose up -d

services:
  # Hop Framework test runner
  hop:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./features:/app/features
      - ./steps:/app/steps
      - ./hooks:/app/hooks
      - ./config:/app/config
      - ./reports:/app/reports
    environment:
      - NODE_ENV=test
      - HOP_ENV=docker
      - HOP_PARALLEL=4
      - CHROME_PATH=/usr/bin/chromium-browser
    depends_on:
      - mock-server
      - database
      - redis
    command: bun run bin/cli.ts
    networks:
      - hop-network

  # Mock server for API testing
  mock-server:
    image: mockoon/mockoon:latest
    ports:
      - "3000:3000"
      - "3001:3001"
    volumes:
      - ./features/data/mocks:/data
    environment:
      - MOCK_PORT=3000
      - MOCK_DYNAMIC_PORT=3001
    networks:
      - hop-network

  # Database for integration tests
  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=hop
      - POSTGRES_PASSWORD=hop_test
      - POSTGRES_DB=hop_tests
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - hop-network

  # Redis for caching tests
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - hop-network

  # Message Queue - RabbitMQ
  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=hop
      - RABBITMQ_DEFAULT_PASS=hop_test
    networks:
      - hop-network

  # Kafka for message testing
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    ports:
      - "9092:9092"
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
    depends_on:
      - zookeeper
    networks:
      - hop-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
      - ZOOKEEPER_TICK_TIME=2000
    networks:
      - hop-network

  # Selenium Grid for browser testing
  selenium-hub:
    image: selenium/hub:4.15
    ports:
      - "4444:4444"
      - "4442:4442"
      - "4443:4443"
    environment:
      - GRID_MAX_SESSION=10
      - GRID_BROWSER_TIMEOUT=300
      - GRID_TIMEOUT=300
    networks:
      - hop-network

  chrome:
    image: selenium/node-chrome:4.15
    shm_size: '2gb'
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
    networks:
      - hop-network

  firefox:
    image: selenium/node-firefox:4.15
    shm_size: '2gb'
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
    networks:
      - hop-network

volumes:
  postgres-data:

networks:
  hop-network:
    driver: bridge
