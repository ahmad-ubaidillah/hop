name: Hop Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: hop
          POSTGRES_PASSWORD: hop_test
          POSTGRES_DB: hop_tests
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run Hop tests
        run: bun run bin/cli.ts test --env test --format html,json

      - name: Upload HTML reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hop-reports
          path: reports/
          retention-days: 30

      - name: Upload JSON results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hop-json-results
          path: reports/*.json
          retention-days: 30

  test-parallel:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        matrix: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run parallel tests
        run: |
          bun run bin/cli.ts test \
            --parallel \
            --concurrency 4 \
            --tags "@parallel"

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hop-parallel-reports-${{ matrix.matrix }}
          path: reports/

  ui-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Run UI tests
        run: |
          bun run bin/cli.ts test \
            --features ./features/ui \
            --video on-failure

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: hop-ui-screenshots
          path: reports/screenshots/

  load-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Generate k6 script
        run: bun run bin/cli.ts gen-k6 --output load-test.js

      - name: Run load test
        uses: k6io/k6-action@v0.2.0
        with:
          filename: load-test.js
          options: >-
            --vus 10
            --duration 30s
            --summary-export=results.json

      - name: Upload k6 results
        uses: actions/upload-artifact@v4
        with:
          name: hop-load-test-results
          path: results.json

  notify:
    needs: [test, test-parallel, ui-tests]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Send Slack notification
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          fields: repo,message,commit,author
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_TITLE: Hop Test Results
          SLACK_COLOR: ${{ job.status }}
