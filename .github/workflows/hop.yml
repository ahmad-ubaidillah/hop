name: Hop BDD Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Install Playwright Browsers
        run: bunx playwright install --with-deps

      - name: Run Hop Tests
        run: bun run bin/cli.ts test -f features/ -p -cn 4 --format html,junit --report-dir reports

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hop-test-report
          path: reports/
